---
name: xconv2
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python >=3.12,<3.14
  - pip !=21.3
  - cartopy  # no pip wheel
  - udunits2  # no pip wheel; required by cf-python/cf-units
  - cf-plot
  - cf-python
  - pandas
  - pyside6
  - setuptools >80  # cfplot imports distutils
  - superqt
  - zarr
  # testing
  - pytest
  - pip
  - pip:
      - "-e ."  # xconv2 is not yet on conda-forge
